# max_width mirrors .editorconfig (max_line_length = 80); rustfmt does not read
# .editorconfig, so the value is duplicated here. Keep in sync by hand.
max_width = 80
# Match the crate edition so direct `rustfmt` calls (editors/tools that bypass
# cargo) do not fall back to edition 2015. `cargo fmt` reads this from Cargo.toml.
# This value duplicates Cargo.toml's `edition` (two unsynchronised literals):
# keep in sync by hand on any future edition bump; the Phase 4 guard test in
# tests/unit/tasks/test_version.py asserts the two editions match.
edition = "2021"

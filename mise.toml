[env]
_.python.venv = { path = ".venv", create = true }

[tools]
uv = "0.11.6"
python = "3.14.4"
gh = "2.89.0"
rust = { version = "1.90.0", components = "rustfmt,clippy" }
node = "22.22.2"
shellcheck = "0.11.0"
shfmt = "3.13.1"
jj = "0.36.0"
jq = "1.7.1"
# Exact pin + explicit backend (aqua), matching the exact-pin discipline of the
# other tools: a floating patch could resolve to a build that errors on the
# `concurrency.queue` sub-key on one runner but not another. See
# tasks/lint/workflows.py for why that sub-key is suppressed.
"aqua:rhysd/actionlint" = "1.7.12"
# Exact pin (aligned to the luminosity-validated version); cargo-deny's rule
# schema is version-sensitive, so a floating patch could change ban/advisory
# evaluation between runners.
"aqua:EmbarkStudios/cargo-deny" = "0.19.8"
# The /cargo-nextest sub-tool-path is required: nextest-rs/nextest publishes its
# binary as `cargo-nextest`, and without the path the aqua backend cannot
# resolve the asset. Exact pins so coverage tooling behaves identically across
# runners.
"aqua:nextest-rs/nextest/cargo-nextest" = "0.9.138"
"aqua:taiki-e/cargo-llvm-cov" = "0.8.7"
# minisign via ubi (direct GitHub-release binary): the launcher's hermetic
# resolution tests sign fixtures with it, and the release keypair is generated
# with it. Exact pin, matching the tool-pin discipline above.
"ubi:jedisct1/minisign[exe=minisign]" = "0.12"

[settings]
experimental = true
# Hash-pin the aqua-backed tool artifacts via a committed mise.lock (regenerate
# + commit on any [tools] edit). Repo-global, so it also pins the pre-existing
# aqua:rhysd/actionlint. Does NOT cover the from-source cargo-pup build or the
# rustup-managed nightly (an accepted unverified surface for the isolated lane).
lockfile = true

[hooks]
postinstall = "uv sync --only-group build --frozen"

[tasks."deps:install:python"]
description = "Install all Python dependencies"
run = "invoke deps.install-python"

[tasks."deps:install:rust-targets"]
description = "Install Rust cross-compile targets required for release builds"
run = "invoke deps.install-rust-targets"

[tasks."deps:install:rust-components"]
description = "Install the rustfmt + clippy + llvm-tools-preview rustup components the cli checks need (mise [tools] `components` is not honoured for an already-present toolchain)"
run = "invoke deps.install-rust-components"

[tasks."deps:install:pup"]
description = "Provision the cargo-pup nightly toolchain + pinned cargo-pup (rustup-managed, not a mise [tool])"
run = "invoke deps.install-pup"

[tasks."deps:install:node"]
description = "Install Node.js dependencies for the visualiser frontend"
run = "invoke deps.install-node"

[tasks."deps:install:playwright"]
description = "Install Playwright browser binaries (Chromium + OS-level deps)"
depends = ["deps:install:node"]
run = "invoke deps.install-playwright"

[tasks."dev"]
description = "Start + supervise the visualiser server + frontend, detached in the background (use dev:stop to tear down; dev:server/dev:frontend for the manual two-terminal flow)"
depends = ["build:server:dev", "deps:install:node"]
run = "invoke dev"

[tasks."dev:stop"]
description = "Stop the supervised dev server + frontend and the circus arbiter"
run = "invoke dev.stop"

[tasks."dev:restart"]
description = "Restart the supervised dev stack (stop then start)"
depends = ["build:server:dev", "deps:install:node"]
run = "invoke dev.restart"

[tasks."dev:status"]
description = "Report dev server + frontend state, frontend URL, and resolved API port (exit 0 = both running, 3 = one, 4 = neither)"
run = "invoke dev.status"

[tasks."dev:server"]
description = "Start the visualiser API server in dev mode (run alongside dev:frontend in a second terminal)"
depends = ["build:server:dev"]
run = "invoke dev.server"

[tasks."dev:frontend"]
description = "Start the Vite frontend dev server proxying /api to dev:server (start dev:server first)"
depends = ["deps:install:node"]
run = "invoke dev.frontend"

[tasks."build:frontend"]
description = "Build the visualiser frontend (Vite production build into dist/)"
depends = ["deps:install:node"]
run = "invoke build.frontend"

[tasks."build:server:dev"]
description = "Build the visualiser server binary with the dev-frontend feature"
run = "invoke build.server-dev"

[tasks."build:server:release"]
description = "Build the frontend, then the visualiser server binary for release (embed-dist; the frontend build overwrites any lint-stub dist/index.html)"
depends = ["build:frontend"]
run = "invoke build.server-release"

[tasks."build:server:cross-compile"]
description = "Cross-compile the visualiser server for all four release targets"
depends = ["deps:install:rust-targets", "build:frontend"]
run = "invoke build.server-cross-compile"

[tasks."build:cli:cross-compile"]
description = "Cross-compile the cli launcher + verify shim for all four release targets (stages into dist/release/)"
depends = ["deps:install:rust-targets"]
run = "invoke build.cli-cross-compile"

[tasks."build:vendor-verify-shims"]
description = "Copy the cross-compiled verify shims into the committed bin/ tree and record the drift marker"
depends = ["build:cli:cross-compile"]
run = "invoke build.vendor-verify-shims"

[tasks."build:debug-archives"]
description = "Create .debug.tar.gz archives for all cross-compiled release binaries"
depends = ["build:server:cross-compile"]
run = "invoke build.create-debug-archives"

[tasks."build:checksums"]
description = "Compute SHA-256 checksums for all release binaries and write checksums.json"
depends = ["build:server:cross-compile"]
run = "invoke build.create-checksums"

[tasks."test:unit:visualiser"]
description = "Run visualiser unit tests"
depends = ["build:frontend"]
run = "invoke test.unit.visualiser"

[tasks."test:unit:frontend"]
description = "Run visualiser frontend unit tests (Vitest)"
depends = ["deps:install:node"]
run = "invoke test.unit.frontend"

[tasks."test:unit:tasks"]
description = "Run pytest unit tests for invoke tasks"
depends = ["deps:install:python"]
run = "uv run pytest tests/unit/tasks -v"

[tasks."test:unit:cli"]
description = "Run cli/ workspace tests via nextest with coverage folded in (report-only; ACCELERATOR_COVERAGE=off drops to plain nextest)"
depends = ["deps:install:rust-components"]
run = "invoke test.cli.run"

[tasks."test:unit:templates"]
description = "Run template / SKILL / metadata-helper schema tests"
run = "invoke test.unit.templates"

[tasks."test:integration:tasks"]
description = "Run pytest integration tests for invoke tasks"
depends = ["deps:install:python"]
run = "uv run pytest tests/integration/tasks -v"

[tasks."test:unit"]
description = "Run all unit tests in parallel"
depends = ["test:unit:visualiser", "test:unit:frontend", "test:unit:tasks", "test:unit:templates", "test:unit:cli"]

[tasks."test:integration:visualiser"]
description = "Run visualiser integration tests"
depends = ["build:server:dev"]
run = "invoke test.integration.visualiser"

[tasks."test:integration:dev"]
description = "Run unified dev task integration tests (real circusd + Python fake processes)"
depends = ["deps:install:python"]
run = "invoke test.integration.dev"

[tasks."test:integration:entrypoint"]
description = "Run bin/accelerator entry-point tests (stubbed fetch, real minisign + verify shim)"
depends = ["deps:install:python"]
run = "invoke test.integration.entrypoint"

[tasks."test:integration:config"]
description = "Run config integration tests"
run = "invoke test.integration.config"

[tasks."test:integration:deny"]
description = "Run the cargo-deny native-tls/OpenSSL ban regression (offline fixtures)"
depends = ["deps:install:python"]
run = "invoke test.integration.deny"

[tasks."test:integration:pup"]
description = "Run the cargo-pup architecture regression (needs the nightly lane; check-architecture only, not the test roll-up)"
depends = ["deps:install:python", "deps:install:pup"]
run = "invoke test.integration.pup"

[tasks."test:integration:decisions"]
description = "Run decisions integration tests"
run = "invoke test.integration.decisions"

[tasks."test:integration:binary-acquisition"]
description = "Test launch-server.sh binary acquisition paths (sentinel rejection, SHA mismatch, 404)"
run = "invoke test.integration.binary-acquisition"

[tasks."test:integration:hooks"]
description = "Run hooks integration tests"
run = "invoke test.integration.hooks"

[tasks."test:integration:github"]
description = "Run github skills integration tests (shell harnesses)"
run = "invoke test.integration.github"
env = { PHASE = "{{ env.PHASE | default(value=\"final\") }}" }

[tasks."test:integration:migrate"]
description = "Run meta-directory migration framework tests (shell harnesses)"
run = "invoke test.integration.migrate"

[tasks."test:integration:work"]
description = "Run work-management skill script tests (shell harnesses)"
run = "invoke test.integration.work"

[tasks."test:integration:integrations"]
description = "Run jira/linear integration script tests (shell harnesses + python3 mock servers)"
run = "invoke test.integration.integrations"

[tasks."test:integration"]
description = "Run all integration tests in parallel"
depends = [
    "test:integration:visualiser",
    "test:integration:dev",
    "test:integration:entrypoint",
    "test:integration:config",
    "test:integration:deny",
    "test:integration:decisions",
    "test:integration:tasks",
    "test:integration:binary-acquisition",
    "test:integration:hooks",
    "test:integration:github",
    "test:integration:migrate",
    "test:integration:work",
    "test:integration:integrations",
]

[tasks."test:e2e:visualiser"]
description = "Run visualiser E2E tests (Playwright)"
depends = ["deps:install:playwright", "build:frontend", "build:server:dev"]
run = "invoke test.e2e.visualiser"

[tasks."test:e2e:visualiser:docker"]
description = "Run visual-regression specs in the pinned Playwright Docker image (compare)"
depends = ["build:frontend", "build:server:dev"]
run = "invoke test.e2e.visualiser-docker"

[tasks."test:e2e:visualiser:docker:update"]
description = "Regenerate the canonical Linux visual-regression baselines in the pinned Docker image"
depends = ["build:frontend", "build:server:dev"]
run = "invoke test.e2e.visualiser-docker --update"

[tasks."test:e2e"]
description = "Run all E2E tests in parallel"
depends = ["test:e2e:visualiser"]

[tasks.test]
description = "Run all tests in parallel"
depends = ["test:unit", "test:integration", "test:e2e"]

[tasks."format:scripts:check"]
description = "Check shell formatting with shfmt (read-only; fails on drift)"
run = "invoke format.scripts.check"

[tasks."format:scripts:fix"]
description = "Format shell scripts in place with shfmt"
run = "invoke format.scripts.fix"

[tasks."format:check"]
description = "Run all format checks (read-only)"
depends = ["format:frontend:check", "format:server:check", "format:cli:check", "format:build-system:check", "format:scripts:check"]

[tasks."format:fix"]
description = "Apply all formatters in place"
depends = ["format:frontend:fix", "format:server:fix", "format:cli:fix", "format:build-system:fix", "format:scripts:fix"]

[tasks."lint:scripts:shellcheck:check"]
description = "Lint shell scripts with ShellCheck (config in .shellcheckrc)"
run = "invoke lint.scripts.shellcheck"

[tasks."lint:scripts:bashisms:check"]
description = "Guard the bash-3.2 floor (denylist of bash-4 constructs)"
run = "invoke lint.scripts.bashisms"

[tasks."lint:scripts:exec-bits:check"]
description = "Enforce exec-bit invariant: a tracked .sh is executable iff not a sourced library"
run = "invoke lint.scripts.exec-bits"

[tasks."lint:scripts:check"]
description = "Run all shell lint checks"
depends = ["lint:scripts:shellcheck:check", "lint:scripts:bashisms:check", "lint:scripts:exec-bits:check"]

[tasks."scripts:check"]
description = "Run all shell format and lint checks (shfmt + ShellCheck + bashisms)"
depends = ["format:scripts:check", "lint:scripts:check"]

[tasks."format:build-system:check"]
description = "Check Python formatting with ruff (read-only; fails on drift)"
depends = ["deps:install:python"]
run = "invoke format.build-system.check"

[tasks."format:build-system:fix"]
description = "Format Python in place with ruff"
depends = ["deps:install:python"]
run = "invoke format.build-system.fix"

[tasks."lint:build-system:check"]
description = "Lint Python with ruff (select = ALL)"
depends = ["deps:install:python"]
run = "invoke lint.build-system.check"

[tasks."lint:build-system:fix"]
description = "Apply ruff's safe lint fixes to Python"
depends = ["deps:install:python"]
run = "invoke lint.build-system.fix"

[tasks."types:build-system:check"]
description = "Type-check Python with pyrefly (strict preset)"
depends = ["deps:install:python"]
run = "invoke types.build-system.check"

[tasks."lint:workflows:check"]
description = "Lint GitHub Actions workflows with actionlint (general syntax hygiene; the queue/gate-placement invariants are guarded by tests/unit/tasks/test_workflows.py)"
run = "invoke lint.workflows.actionlint"

[tasks."lint:workflows"]
description = "Lint GitHub Actions workflows with actionlint"
depends = ["lint:workflows:check"]

[tasks."build-system:check"]
description = "Run all Python format, lint, and type checks plus workflow lint (ruff + pyrefly + actionlint)"
depends = ["format:build-system:check", "lint:build-system:check", "types:build-system:check", "lint:workflows:check"]

[tasks."format:server:check"]
description = "Check Rust formatting with rustfmt (cargo fmt --check)"
run = "invoke format.server.check"

[tasks."format:server:fix"]
description = "Format Rust in place (cargo fmt)"
run = "invoke format.server.fix"

[tasks."format:cli:check"]
description = "Check cli/ workspace Rust formatting with rustfmt (read-only; fails on drift)"
depends = ["deps:install:rust-components"]
run = "invoke format.cli.check"

[tasks."format:cli:fix"]
description = "Format the cli/ workspace in place with rustfmt"
depends = ["deps:install:rust-components"]
run = "invoke format.cli.fix"

[tasks."build:frontend:stub"]
description = "Write a placeholder frontend/dist/index.html if absent (satisfies embed-dist build.rs for lint-only compiles; not a real build; real build:frontend overwrites it)"
run = "invoke build.frontend-stub"

[tasks."lint:server:check"]
description = "Lint Rust with clippy, two feature passes, -D warnings (gated on a dist stub, not a full SPA build; still two cold compiles — slow on a cold cache)"
depends = ["build:frontend:stub"]
run = "invoke lint.server.check"

[tasks."lint:server:fix"]
description = "Apply clippy's machine-applicable fixes (cargo clippy --fix, default features only — all-features/dev-frontend arms surface via server:check and may need manual fixes)"
depends = ["build:frontend:stub"]
run = "invoke lint.server.fix"

[tasks."server:check"]
description = "Run all Rust format and lint checks (rustfmt + clippy)"
depends = ["format:server:check", "lint:server:check"]

[tasks."lint:cli:check"]
description = "Lint the cli/ workspace with clippy (one workspace-wide pass covering every member, -D warnings)"
depends = ["deps:install:rust-components"]
run = "invoke lint.cli.check"

[tasks."lint:cli:fix"]
description = "Apply clippy's machine-applicable fixes to the cli/ workspace (machine-rewritable subset only — run lint:cli:check for the rest)"
depends = ["deps:install:rust-components"]
run = "invoke lint.cli.fix"

[tasks."lint:vendor-shims:check"]
description = "Guard the committed verify shims against their cli/verify build inputs (drift marker + per-platform magic bytes)"
depends = ["deps:install:python"]
run = "invoke lint.vendor-shims.check"

[tasks."cli:check"]
description = "Run all cli/ workspace format and lint checks (workspace-wide rustfmt + clippy + vendored-shim drift guard; read-only, no tests)"
depends = ["format:cli:check", "lint:cli:check", "lint:vendor-shims:check"]

[tasks."deny:check"]
description = "Check the cli/ workspace dependency graph with cargo-deny (advisories, licenses, bans, sources)"
run = "invoke deny.check"

[tasks."pup:check"]
description = "Enforce intra-crate module-import rules with cargo-pup (blocking nightly lane; ACCELERATOR_PUP_MODE=warn downgrades to advisory)"
depends = ["deps:install:pup"]
run = "invoke pup.check"

[tasks."format:frontend:check"]
description = "Check frontend formatting with Biome (read-only)"
depends = ["deps:install:node"]
run = "invoke format.frontend.check"

[tasks."format:frontend:fix"]
description = "Format the frontend in place with Biome"
depends = ["deps:install:node"]
run = "invoke format.frontend.fix"

[tasks."lint:frontend:check"]
description = "Lint the frontend with Biome (react+test+project, warnings-as-errors)"
depends = ["deps:install:node"]
run = "invoke lint.frontend.check"

[tasks."lint:frontend:fix"]
description = "Apply Biome's safe lint fixes to the frontend"
depends = ["deps:install:node"]
run = "invoke lint.frontend.fix"

[tasks."types:frontend:check"]
description = "Type-check the frontend with tsc (tsc -b --noEmit)"
depends = ["deps:install:node"]
run = "invoke types.frontend.check"

[tasks."frontend:check"]
description = "Run all frontend format, lint, and type checks (Biome + tsc)"
depends = ["format:frontend:check", "lint:frontend:check", "types:frontend:check"]

[tasks."lint:check"]
description = "Run all lint checks"
depends = ["lint:frontend:check", "lint:server:check", "lint:cli:check", "lint:build-system:check", "lint:scripts:check"]

[tasks."lint:fix"]
description = "Apply all safe lint fixes (shell has no autofixer — run `mise run scripts:check` for remaining shell findings)"
depends = ["lint:frontend:fix", "lint:server:fix", "lint:cli:fix", "lint:build-system:fix"]

[tasks."types:check"]
description = "Run all type checks (tsc + pyrefly)"
depends = ["types:frontend:check", "types:build-system:check"]

[tasks.fix]
description = "Apply all formatters + safe lint fixes (MECHANICAL only — no type-checks, and shell has no autofixer; still run `mise run check` before pushing)"
depends = ["format:fix", "lint:fix"]

[tasks.check]
description = "Run all read-only format, lint, and type checks (what CI runs)"
depends = ["frontend:check", "server:check", "cli:check", "deny:check", "pup:check", "build-system:check", "scripts:check"]

[tasks.default]
description = "Full local CI mirror: build, format-fix, lint, type-check, deny/pup static checks, test (heavy — reformats in place + compiles Rust several times; for a fast inner loop use a single <component>:check)"
depends = ["build:frontend", "build:server:dev", "format:fix", "lint:check", "types:check", "deny:check", "pup:check", "test"]

[tasks."version:read"]
description = "Read plugin version"
run = "invoke version.read"

[tasks."version:write"]
description = "Write plugin version"
run = "invoke version.write"

[tasks."version:bump"]
description = "Bump plugin version"
run = "invoke version.bump"

[tasks."github:check-auth"]
description = "Verify the GitHub CLI is authenticated"
run = "invoke github.check-auth"

[tasks."keys:generate"]
description = "Generate a -W release signing keypair (writes keys/accelerator-release.{pub,sec}; does not print the secret)"
run = "invoke keys.generate"

[tasks."git:check-clean"]
description = "Abort if the working tree has any uncommitted changes"
run = "invoke git.check-clean"

[tasks."prerelease:prepare"]
description = "CI prerelease halve 1: bump version, build binaries, compute checksums"
depends = ["deps:install:rust-targets", "deps:install:node", "github:check-auth", "git:check-clean"]
run = "invoke prerelease.prepare"

[tasks."prerelease:finalise"]
description = "CI prerelease halve 2: commit, tag, push, create release, upload, publish"
run = "invoke prerelease.finalise"

[tasks."release:prepare"]
description = "CI stable release halve 1: finalise version, update marketplace and changelog, build binaries"
depends = ["deps:install:rust-targets", "deps:install:node", "github:check-auth", "git:check-clean"]
run = "invoke release.prepare"

[tasks."release:finalise"]
description = "CI stable release halve 2: commit, tag, push, create release, upload, publish"
run = "invoke release.finalise"

[tasks."prerelease"]
description = "Local dev only: full prerelease flow without SLSA attestation"
depends = ["deps:install:rust-targets", "deps:install:node", "github:check-auth", "git:check-clean"]
run = "invoke prerelease"

[tasks."release"]
description = "Local dev only: full stable release flow without SLSA attestation"
depends = ["deps:install:rust-targets", "deps:install:node", "github:check-auth", "git:check-clean"]
run = "invoke release"

[env]
_.python.venv = { path = ".venv", create = true }

[tools]
uv = "0.11.6"
python = "3.14.4"
gh = "2.89.0"
rust = "1.90.0"
node = "22"
shellcheck = "0.11.0"
shfmt = "3.13.1"
jj = "0.36.0"
jq = "1.7.1"

[settings]
experimental = true

[hooks]
postinstall = "uv sync --only-group build --frozen"

[tasks."deps:install:python"]
description = "Install all Python dependencies"
run = "invoke deps.install-python"

[tasks."deps:install:rust-targets"]
description = "Install Rust cross-compile targets required for release builds"
run = "invoke deps.install-rust-targets"

[tasks."deps:install:node"]
description = "Install Node.js dependencies for the visualiser frontend"
run = "invoke deps.install-node"

[tasks."deps:install:playwright"]
description = "Install Playwright browser binaries (Chromium + OS-level deps)"
depends = ["deps:install:node"]
run = "invoke deps.install-playwright"

[tasks."dev"]
description = "Start + supervise the visualiser server + frontend, detached in the background (use dev:stop to tear down; dev:server/dev:frontend for the manual two-terminal flow)"
depends = ["build:server:dev", "deps:install:node"]
run = "invoke dev"

[tasks."dev:stop"]
description = "Stop the supervised dev server + frontend and the circus arbiter"
run = "invoke dev.stop"

[tasks."dev:restart"]
description = "Restart the supervised dev stack (stop then start)"
depends = ["build:server:dev", "deps:install:node"]
run = "invoke dev.restart"

[tasks."dev:status"]
description = "Report dev server + frontend state, frontend URL, and resolved API port (exit 0 = both running, 3 = one, 4 = neither)"
run = "invoke dev.status"

[tasks."dev:server"]
description = "Start the visualiser API server in dev mode (run alongside dev:frontend in a second terminal)"
depends = ["build:server:dev"]
run = "invoke dev.server"

[tasks."dev:frontend"]
description = "Start the Vite frontend dev server proxying /api to dev:server (start dev:server first)"
depends = ["deps:install:node"]
run = "invoke dev.frontend"

[tasks."build:frontend"]
description = "Build the visualiser frontend (Vite production build into dist/)"
depends = ["deps:install:node"]
run = "invoke build.frontend"

[tasks."build:server:dev"]
description = "Build the visualiser server binary with the dev-frontend feature"
run = "invoke build.server-dev"

[tasks."build:server:release"]
description = "Build the visualiser server binary for release (embed-dist)"
run = "invoke build.server-release"

[tasks."build:server:cross-compile"]
description = "Cross-compile the visualiser server for all four release targets"
depends = ["deps:install:rust-targets", "build:frontend"]
run = "invoke build.server-cross-compile"

[tasks."build:debug-archives"]
description = "Create .debug.tar.gz archives for all cross-compiled release binaries"
depends = ["build:server:cross-compile"]
run = "invoke build.create-debug-archives"

[tasks."build:checksums"]
description = "Compute SHA-256 checksums for all release binaries and write checksums.json"
depends = ["build:server:cross-compile"]
run = "invoke build.create-checksums"

[tasks."test:unit:visualiser"]
description = "Run visualiser unit tests"
depends = ["build:frontend"]
run = "invoke test.unit.visualiser"

[tasks."test:unit:frontend"]
description = "Run visualiser frontend unit tests (Vitest)"
depends = ["deps:install:node"]
run = "invoke test.unit.frontend"

[tasks."test:unit:tasks"]
description = "Run pytest unit tests for invoke tasks"
depends = ["deps:install:python"]
# Auto-discover every test under tests/tasks, excluding the integration suites
# that live in the same tree and run under test:integration:tasks /
# test:integration:dev (they are slow and need their own setup).
run = "uv run pytest tests/tasks --ignore=tests/tasks/test_github.py --ignore=tests/tasks/test_release.py --ignore=tests/tasks/test_dev_integration.py -v"

[tasks."test:unit:templates"]
description = "Run template / SKILL / metadata-helper schema tests"
run = "invoke test.unit.templates"

[tasks."test:integration:tasks"]
description = "Run pytest integration tests for invoke tasks"
depends = ["deps:install:python"]
run = "uv run pytest tests/tasks/test_github.py tests/tasks/test_release.py -v"

[tasks."test:unit"]
description = "Run all unit tests in parallel"
depends = ["test:unit:visualiser", "test:unit:frontend", "test:unit:tasks", "test:unit:templates"]

[tasks."test:integration:visualiser"]
description = "Run visualiser integration tests"
depends = ["build:server:dev"]
run = "invoke test.integration.visualiser"

[tasks."test:integration:dev"]
description = "Run unified dev task integration tests (real circusd + Python fake processes)"
depends = ["deps:install:python"]
run = "invoke test.integration.dev"

[tasks."test:integration:config"]
description = "Run config integration tests"
run = "invoke test.integration.config"

[tasks."test:integration:decisions"]
description = "Run decisions integration tests"
run = "invoke test.integration.decisions"

[tasks."test:integration:binary-acquisition"]
description = "Test launch-server.sh binary acquisition paths (sentinel rejection, SHA mismatch, 404)"
run = "invoke test.integration.binary-acquisition"

[tasks."test:integration:hooks"]
description = "Run hooks integration tests"
run = "invoke test.integration.hooks"

[tasks."test:integration:github"]
description = "Run github skills integration tests (shell harnesses)"
run = "invoke test.integration.github"
env = { PHASE = "{{ env.PHASE | default(value=\"final\") }}" }

[tasks."test:integration:migrate"]
description = "Run meta-directory migration framework tests (shell harnesses)"
run = "invoke test.integration.migrate"

[tasks."test:integration"]
description = "Run all integration tests in parallel"
depends = [
    "test:integration:visualiser",
    "test:integration:dev",
    "test:integration:config",
    "test:integration:decisions",
    "test:integration:tasks",
    "test:integration:binary-acquisition",
    "test:integration:hooks",
    "test:integration:github",
    "test:integration:migrate",
]

[tasks."test:e2e:visualiser"]
description = "Run visualiser E2E tests (Playwright)"
depends = ["deps:install:playwright", "build:frontend", "build:server:dev"]
run = "invoke test.e2e.visualiser"

[tasks."test:e2e"]
description = "Run all E2E tests in parallel"
depends = ["test:e2e:visualiser"]

[tasks.test]
description = "Run all tests in parallel"
depends = ["test:unit", "test:integration", "test:e2e"]

[tasks."format:scripts:check"]
description = "Check shell formatting with shfmt (read-only; fails on drift)"
run = "invoke format.scripts.check"

[tasks."format:scripts:fix"]
description = "Format shell scripts in place with shfmt"
run = "invoke format.scripts.fix"

[tasks."format:check"]
description = "Run all format checks (read-only)"
depends = ["format:scripts:check"]

[tasks."format:fix"]
description = "Apply all formatters in place"
depends = ["format:scripts:fix"]

[tasks."lint:scripts:shellcheck:check"]
description = "Lint shell scripts with ShellCheck (-x, --severity=warning)"
run = "invoke lint.scripts.shellcheck"

[tasks."lint:scripts:bashisms:check"]
description = "Guard the bash-3.2 floor (denylist of bash-4 constructs)"
run = "invoke lint.scripts.bashisms"

[tasks."lint:scripts:check"]
description = "Run all shell lint checks"
depends = ["lint:scripts:shellcheck:check", "lint:scripts:bashisms:check"]

[tasks."lint:check"]
description = "Run all lint checks"
depends = ["lint:scripts:check"]

[tasks.check]
description = "Run all read-only format and lint checks (what CI runs)"
depends = ["format:check", "lint:check"]

[tasks.default]
description = "Build all artifacts, format, lint, and run all tests"
depends = ["build:frontend", "build:server:dev", "format:fix", "lint:check", "test"]

[tasks."version:read"]
description = "Read plugin version"
run = "invoke version.read"

[tasks."version:write"]
description = "Write plugin version"
run = "invoke version.write"

[tasks."version:bump"]
description = "Bump plugin version"
run = "invoke version.bump"

[tasks."github:check-auth"]
description = "Verify the GitHub CLI is authenticated"
run = "invoke github.check-auth"

[tasks."git:check-clean"]
description = "Abort if the working tree has any uncommitted changes"
run = "invoke git.check-clean"

[tasks."prerelease:prepare"]
description = "CI prerelease halve 1: bump version, build binaries, compute checksums"
depends = ["deps:install:rust-targets", "deps:install:node", "github:check-auth", "git:check-clean"]
run = "invoke prerelease.prepare"

[tasks."prerelease:finalise"]
description = "CI prerelease halve 2: commit, tag, push, create release, upload, publish"
run = "invoke prerelease.finalise"

[tasks."release:prepare"]
description = "CI stable release halve 1: finalise version, update marketplace and changelog, build binaries"
depends = ["deps:install:rust-targets", "deps:install:node", "github:check-auth", "git:check-clean"]
run = "invoke release.prepare"

[tasks."release:finalise"]
description = "CI stable release halve 2: commit, tag, push, create release, upload, publish"
run = "invoke release.finalise"

[tasks."prerelease"]
description = "Local dev only: full prerelease flow without SLSA attestation"
depends = ["deps:install:rust-targets", "deps:install:node", "github:check-auth", "git:check-clean"]
run = "invoke prerelease"

[tasks."release"]
description = "Local dev only: full stable release flow without SLSA attestation"
depends = ["deps:install:rust-targets", "deps:install:node", "github:check-auth", "git:check-clean"]
run = "invoke release"

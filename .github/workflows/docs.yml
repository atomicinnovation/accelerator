name: Docs

on:
  push:
    branches:
      - main
      # Escape hatch: push this branch to deploy the docs before merging.
      - force-deploy-docs
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize
  # Manual escape hatch: redeploy the docs site on demand without a push.
  # Run via the Actions "Run workflow" button or `gh workflow run docs.yml`.
  workflow_dispatch:

# Job-level grants on deploy-docs override this; every other job runs
# read-only regardless of the repository default token scope.
permissions:
  contents: read

jobs:
  check-docs:
    name: Check documentation site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          # No step needs git credentials after checkout; keep the token
          # off disk while npm lifecycle scripts run.
          persist-credentials: false

      - name: Install dependencies
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d
        with:
          install: true
          cache: true
          experimental: true

      - name: Run documentation site checks
        run: mise run docs:check

  # Build (npm lifecycle scripts included) runs unprivileged; only the
  # deploy job below holds the Pages/OIDC permissions, so no dependency
  # code ever executes with those tokens in scope.
  build-docs:
    name: Build documentation site
    runs-on: ubuntu-latest
    needs: check-docs
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          # No step needs git credentials after checkout; keep the token
          # off disk while npm lifecycle scripts run.
          persist-credentials: false

      - name: Install dependencies
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d
        with:
          install: true
          cache: true
          experimental: true

      - name: Build documentation site
        run: mise run docs:build

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs-site/dist

  deploy-docs:
    name: Deploy documentation site
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    concurrency:
      group: github-pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

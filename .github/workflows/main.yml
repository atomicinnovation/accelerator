name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize

jobs:
  test-unit:
    name: Run unit tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Run unit tests
        run: mise run test:unit

  test-integration:
    name: Run integration tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    # Defence-in-depth against subprocess-fork pressure on the few-core hosted
    # runners. The primary cause was rustc compilation spiking mid-run (see the
    # warm-up steps below); capping mise's parallelism (default 4) is the
    # belt-and-braces so the surviving subprocess-heavy suites (binary-
    # acquisition's bash/jq forks, dev's circusd + fakes) cannot oversubscribe
    # the runner and trip a fork() failure. Keep BOTH this cap and the warm-up
    # steps — neither alone fully isolates the timing-sensitive suites.
    env:
      MISE_JOBS: "2"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      # Compile all the Rust the integration run needs up front, in their own
      # steps, so no rustc compilation runs concurrently with the timing- and
      # fork-sensitive shell suites (binary-acquisition, dev). The dev-profile
      # binary and the test-profile test binaries are SEPARATE artifact sets —
      # both must be warmed, or test:integration:visualiser still compiles the
      # test harnesses (dev-deps like assert_cmd) mid-run, spiking CPU/memory
      # and starving the sibling suites' subprocess forks. With both warmed,
      # test:integration does no compilation.
      - name: Build visualiser server
        run: mise run build:server:dev

      - name: Compile visualiser test binaries
        run: mise run build:server:dev-tests

      - name: Run integration tests
        run: mise run test:integration

  test-e2e:
    name: Run E2E tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Run E2E tests
        run: mise run test:e2e

  check:
    name: Run checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Run checks
        run: mise run check

  prerelease:
    name: Create prerelease
    runs-on: macos-latest
    needs:
      - test-unit
      - test-integration
      - test-e2e
      - check
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Prepare prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:prepare

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "skills/visualisation/visualise/bin/accelerator-visualiser-*"

      - name: Finalise prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:finalise

  release:
    name: Create release
    runs-on: macos-latest
    if: github.event_name == 'push'
    needs: prerelease
    environment: release
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Prepare stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run release:prepare

      - name: Attest stable binary provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "skills/visualisation/visualise/bin/accelerator-visualiser-*"

      - name: Finalise stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run release:finalise

      - name: Prepare post-stable prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:prepare

      - name: Attest post-stable binary provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "skills/visualisation/visualise/bin/accelerator-visualiser-*"

      - name: Finalise post-stable prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:finalise

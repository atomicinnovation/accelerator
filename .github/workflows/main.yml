name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize

jobs:
  test-unit:
    name: Run unit tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # test:unit:cli compiles Rust on BOTH matrix legs (previously only the
      # ubuntu server-check compiled Rust), so the toolchain-cache race applies
      # here too: route rustup into the cached mise data dir before install.
      - name: Route the rust toolchain into the cached mise data dir
        run: echo "RUSTUP_HOME=$HOME/.local/share/mise/rustup" >> "$GITHUB_ENV"

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          # OS-disambiguated so the ubuntu/macos legs never share a
          # toolchain-cache namespace.
          cache_key_prefix: mise-test-unit-${{ matrix.os }}-v1
          experimental: true

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: mise run test:unit

  test-integration:
    name: Run integration tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # test:integration:deny (and the visualiser cargo tests) run cargo on
      # BOTH matrix legs, so route rustup into the cached mise data dir before
      # install to avoid the toolchain-cache race.
      - name: Route the rust toolchain into the cached mise data dir
        run: echo "RUSTUP_HOME=$HOME/.local/share/mise/rustup" >> "$GITHUB_ENV"

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          cache_key_prefix: mise-test-integration-${{ matrix.os }}-v1
          experimental: true

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Run integration tests
        run: mise run test:integration

  test-e2e:
    name: Run E2E tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Run E2E tests
        run: mise run test:e2e

  test-visual-regression:
    name: Run visual regression tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Run visual regression tests
        run: mise run test:e2e:visualiser:docker

  check-scripts:
    name: Check scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Run script checks
        run: mise run scripts:check

  check-build-system:
    name: Check build system
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Run build system checks
        run: mise run build-system:check

  check-visualiser-server:
    name: Check visualiser server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Route the rustup toolchain inside the mise data dir, which mise-action
      # caches in full, so the rustfmt/clippy components persist across runs.
      # By default, rust lives in ~/.rustup (outside the cache), so a cache hit
      # makes `mise install` no-op while the toolchain is absent and the
      # parallel format/lint server checks race to auto-install it ("detected
      # conflict: bin/cargo"). Must be set before mise install runs.
      - name: Route the rust toolchain into the cached mise data dir
        run: echo "RUSTUP_HOME=$HOME/.local/share/mise/rustup" >> "$GITHUB_ENV"

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          # Own cache namespace: this job's cache carries the rust toolchain the
          # other jobs don't need, and a distinct key forces the first run after
          # this change to repopulate it under the relocated RUSTUP_HOME.
          cache_key_prefix: mise-server-v1
          experimental: true

      - name: Run visualiser server checks
        run: mise run server:check

  check-cli:
    name: Check cli
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Route the rustup toolchain inside the mise data dir (which mise-action
      # caches in full) so the rustfmt/clippy components persist across runs.
      # By default rust lives in ~/.rustup (outside the cache), so a cache hit
      # makes `mise install` no-op while the toolchain is absent and parallel
      # cargo passes race to auto-install it. Must be set before mise install.
      - name: Route the rust toolchain into the cached mise data dir
        run: echo "RUSTUP_HOME=$HOME/.local/share/mise/rustup" >> "$GITHUB_ENV"

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          # Own toolchain-cache namespace, distinct from every other cargo job
          # so jobs never share a toolchain-cache namespace.
          cache_key_prefix: mise-cli-v1
          experimental: true

      # Complementary to the RUSTUP_HOME routing above: that isolates the
      # toolchain, this caches target/.
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Run cli checks
        run: mise run cli:check

  check-cli-msrv:
    name: Check cli MSRV
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Route the rust toolchain into the cached mise data dir
        run: echo "RUSTUP_HOME=$HOME/.local/share/mise/rustup" >> "$GITHUB_ENV"

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          cache_key_prefix: mise-cli-msrv-v1
          experimental: true

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Pin the exact rust-version floor independently of the mise dev toolchain,
      # so a future mise rust bump cannot silently raise the MSRV without this
      # leg catching an MSRV-incompatible transitive dep.
      - name: Install the pinned MSRV toolchain
        run: rustup toolchain install 1.90.0 --profile minimal

      # Build + test the cli workspace on the exact MSRV so an MSRV-breaking
      # transitive bump in the fast-moving reqwest/rustls closure fails in CI,
      # not at a user's first fetch. --locked proves Cargo.lock is coherent.
      - name: Build and test on the pinned MSRV
        run: >-
          cargo +1.90.0 test --manifest-path cli/Cargo.toml --workspace --locked

      # resolver = "3" MSRV-aware selection can pick older dependency versions;
      # re-run deny after the bump so a perturbed licence closure or a
      # dep-version advisory is caught here rather than in production.
      - name: Re-run supply-chain checks after the resolver bump
        run: mise run deny:check

  check-supply-chain:
    name: Check supply chain
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # cargo-deny shells `cargo metadata`, so the toolchain-cache race applies
      # here too: route rustup into the cached mise data dir before install.
      - name: Route the rust toolchain into the cached mise data dir
        run: echo "RUSTUP_HOME=$HOME/.local/share/mise/rustup" >> "$GITHUB_ENV"

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          cache_key_prefix: mise-supply-chain-v1
          experimental: true

      # The RustSec advisory DB is fetched fresh each run (never cached stale)
      # so newly-disclosed advisories are caught; cargo-deny fails, not warns,
      # if the DB is unavailable.
      - name: Run supply-chain checks
        run: mise run deny:check

  check-architecture:
    name: Check architecture
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Route the rust toolchain into the cached mise data dir
        run: echo "RUSTUP_HOME=$HOME/.local/share/mise/rustup" >> "$GITHUB_ENV"

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          cache_key_prefix: mise-architecture-v1
          experimental: true

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # This is the ONLY nightly consumer. pup:check self-provisions the
      # nightly + cargo-pup (rebuilt from source each run — no trustworthy
      # per-OS prebuilt checksum) via its deps:install:pup dependency. It sets
      # no ACCELERATOR_PUP_MODE, so CI runs the fail-closed `deny` default —
      # `warn` can never be the CI default.
      - name: Run architecture check (self-provisions the nightly lane)
        run: mise run pup:check

      - name: Run cargo-pup behavioural regression
        run: mise run test:integration:pup

  check-visualiser-frontend:
    name: Check visualiser frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Run visualiser frontend checks
        run: mise run frontend:check

  prerelease:
    name: Create prerelease
    runs-on: macos-latest
    needs:
      - test-unit
      - test-integration
      - test-e2e
      - test-visual-regression
      - check-scripts
      - check-build-system
      - check-visualiser-server
      - check-visualiser-frontend
      - check-cli
      - check-cli-msrv
      - check-supply-chain
      - check-architecture
    if: github.event_name == 'push'
    # Serialise all release pipelines onto one queue: prepare (pull + bump) and
    # finalise (commit + tag + push) are steps in this single job, so a queued
    # pipeline cannot start its prepare until the running one has pushed — which
    # stops two pipelines bumping to the same version and racing their pushes.
    # cancel-in-progress: false makes runs wait rather than abort; queue: max
    # then FIFO-queues pending runs (up to 100) instead of evicting the single
    # pending slot, so an approved release queued behind a running prerelease is
    # never dropped. (queue: max with cancel-in-progress: true is a validation
    # error — keep it false.)
    # Keep in sync with the other accelerator-release block: both members must
    # declare identical settings (group, cancel-in-progress: false, queue: max).
    concurrency:
      group: accelerator-release
      cancel-in-progress: false
      queue: max
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Prepare prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:prepare

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "skills/visualisation/visualise/bin/accelerator-visualiser-*"

      - name: Finalise prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:finalise

  approve-release:
    name: Approve release
    # Cheapest host for a no-op gate: this job runs one trivial step and needs
    # no toolchain (macOS is only required for the cross-compile/attest steps on
    # the prerelease/release work jobs).
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: prerelease
    # The approval gate lives HERE and carries NO concurrency group — on
    # purpose. GitHub Actions acquires a concurrency group at queue time, so a
    # job in the "Waiting" approval state holds its group for the entire,
    # unbounded approval wait. Giving this gate ANY group would recreate the
    # original bug inside the approval lane: a Waiting approval would hold the
    # group and stop every later push's approval gate from even reaching its own
    # prompt — you could only ever act on the oldest pending approval, never
    # pick which pipeline to release.
    #
    # So each push spawns an independent, simultaneously-visible gate and any
    # can be approved in any order. Approving several does NOT race two
    # simultaneous releases: the `release` work job's accelerator-release lock
    # (queue: max) serialises the publish window, and release:prepare re-pulls +
    # re-bumps against current HEAD at execution time, so each approved release
    # cuts a sequential, HEAD-correct stable version. That is the intended "each
    # approved push gets its release" semantics, not a hazard.
    environment: release
    steps:
      # No-op: this job exists solely to host the environment approval gate.
      - name: Approval gate (no-op; the gate is the environment, not this step)
        run: echo "Stable release approved"

  release:
    name: Create release
    runs-on: macos-latest
    if: github.event_name == 'push'
    needs: approve-release
    # The release lock lives HERE, deliberately WITHOUT `environment`. This
    # group must never enclose the approval gate (see approve-release) — a
    # Waiting, approval-gated job holds its concurrency group for its whole
    # wait, which would block every subsequent prerelease. By the time this job
    # is queued the release is already approved, so the lock covers only the
    # active commit/tag/push window (tasks/release.py:_publish), exactly as
    # intended.
    # Keep in sync with the other accelerator-release block: both members must
    # declare identical settings (group, cancel-in-progress: false, queue: max).
    concurrency:
      group: accelerator-release
      cancel-in-progress: false
      queue: max
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      # The steps below stay INSIDE this locked, approved job on purpose: the
      # post-stable prerelease re-cut (prepare/attest/finalise, last three
      # steps) must run after the stable push and within the same
      # accelerator-release window so no concurrent pipeline can bump/push
      # between the two cuts (version monotonicity). Do not hoist it into a
      # separate job.
      - name: Prepare stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run release:prepare

      - name: Attest stable binary provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "skills/visualisation/visualise/bin/accelerator-visualiser-*"

      - name: Finalise stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run release:finalise

      - name: Prepare post-stable prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:prepare

      - name: Attest post-stable binary provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "skills/visualisation/visualise/bin/accelerator-visualiser-*"

      - name: Finalise post-stable prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:finalise

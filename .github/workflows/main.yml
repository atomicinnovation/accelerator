name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Run all tests
        run: mise run test

  prerelease:
    name: Create prerelease
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Prepare prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run release:prerelease-prepare

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "skills/visualisation/visualise/bin/accelerator-visualiser-*"

      - name: Finalize prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run release:prerelease-finalize

  release:
    name: Create release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: prerelease
    environment: release
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Prepare stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run release:stable-prepare

      - name: Attest stable binary provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "skills/visualisation/visualise/bin/accelerator-visualiser-*"

      - name: Publish stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run release:stable-publish

      - name: Prepare post-stable prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run release:post-stable-prepare

      - name: Attest post-stable binary provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "skills/visualisation/visualise/bin/accelerator-visualiser-*"

      - name: Publish post-stable prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run release:post-stable-publish

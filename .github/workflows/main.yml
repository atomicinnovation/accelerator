name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize

jobs:
  test-unit:
    name: Run unit tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Run unit tests
        run: mise run test:unit

  test-integration:
    name: Run integration tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Run integration tests
        run: mise run test:integration

  test-e2e:
    name: Run E2E tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Run E2E tests
        run: mise run test:e2e

  check-scripts:
    name: Check shell scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Run shell checks
        run: mise run scripts:check

  check-build-system:
    name: Check Python build system
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Run Python checks
        run: mise run build-system:check

  check-server:
    name: Check Rust server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Run Rust checks
        run: mise run server:check

  prerelease:
    name: Create prerelease
    runs-on: macos-latest
    needs:
      - test-unit
      - test-integration
      - test-e2e
      - check-scripts
      - check-build-system
      - check-server
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Prepare prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:prepare

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "skills/visualisation/visualise/bin/accelerator-visualiser-*"

      - name: Finalise prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:finalise

  release:
    name: Create release
    runs-on: macos-latest
    if: github.event_name == 'push'
    needs: prerelease
    environment: release
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
          experimental: true

      - name: Prepare stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run release:prepare

      - name: Attest stable binary provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "skills/visualisation/visualise/bin/accelerator-visualiser-*"

      - name: Finalise stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run release:finalise

      - name: Prepare post-stable prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:prepare

      - name: Attest post-stable binary provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "skills/visualisation/visualise/bin/accelerator-visualiser-*"

      - name: Finalise post-stable prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:finalise

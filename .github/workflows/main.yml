name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize

jobs:
  test-unit:
    name: Run unit tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Run unit tests
        run: mise run test:unit

  test-integration:
    name: Run integration tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      # Compile the visualiser server up front, in its own step, so the
      # heavyweight Rust build does not run concurrently with the timing-
      # sensitive integration suites (dev, binary-acquisition). On the
      # few-core macOS runners that contention starved real-process startup
      # and fork-heavy shell paths, flaking those suites. With the build
      # already done, its dependency in test:integration is a no-op.
      - name: Build visualiser server
        run: mise run build:server:dev

      - name: Run integration tests
        run: mise run test:integration

  test-e2e:
    name: Run E2E tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Run E2E tests
        run: mise run test:e2e

  check:
    name: Run checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Run checks
        run: mise run check

  prerelease:
    name: Create prerelease
    runs-on: macos-latest
    needs:
      - test-unit
      - test-integration
      - test-e2e
      - check
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Prepare prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:prepare

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "skills/visualisation/visualise/bin/accelerator-visualiser-*"

      - name: Finalise prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:finalise

  release:
    name: Create release
    runs-on: macos-latest
    if: github.event_name == 'push'
    needs: prerelease
    environment: release
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Prepare stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run release:prepare

      - name: Attest stable binary provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "skills/visualisation/visualise/bin/accelerator-visualiser-*"

      - name: Finalise stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run release:finalise

      - name: Prepare post-stable prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:prepare

      - name: Attest post-stable binary provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "skills/visualisation/visualise/bin/accelerator-visualiser-*"

      - name: Finalise post-stable prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run prerelease:finalise

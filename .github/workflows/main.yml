name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Run all tests
        run: mise run test

  prerelease:
    name: Create prerelease
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Create prerelease
        run: mise run prerelease

  release:
    name: Create release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: prerelease
    environment: release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          experimental: true

      - name: Create release
        run: mise run release
